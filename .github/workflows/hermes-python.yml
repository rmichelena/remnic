name: Hermes Python CI

on:
  pull_request:
    paths:
      - "packages/plugin-hermes/**"
      - ".github/workflows/hermes-python.yml"
  push:
    branches: [main]
    paths:
      - "packages/plugin-hermes/**"
      - ".github/workflows/hermes-python.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/plugin-hermes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Type check
        run: mypy remnic_hermes/ --ignore-missing-imports

      - name: Lint
        run: ruff check remnic_hermes/

      - name: Tests
        run: pytest tests/ -v

  publish:
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/remnic-hermes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Check if version already published
        id: check
        working-directory: packages/plugin-hermes
        run: |
          VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          ESCAPED="$(echo "$VERSION" | sed 's/\./\\./g')"
          if pip index versions remnic-hermes 2>/dev/null | grep -qE "(^|[ ,])${ESCAPED}([ ,]|$)"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION is already on PyPI — skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.check.outputs.published != 'true'
        working-directory: packages/plugin-hermes
        run: python -m build

      - name: Verify package metadata
        if: steps.check.outputs.published != 'true'
        working-directory: packages/plugin-hermes
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to PyPI
        if: steps.check.outputs.published != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/plugin-hermes/dist/
