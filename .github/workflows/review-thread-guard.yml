name: Review Thread Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  pull-requests: read

jobs:
  unresolved-review-threads:
    runs-on: ubuntu-latest
    steps:
      - name: Fail on unresolved review threads
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            // pull_request and pull_request_review_comment events include issue.number for the PR.
            // pull_request_review events include pull_request.number.
            const candidate =
              context.payload.pull_request?.number ??
              context.payload.issue?.number ??
              null;
            const pr = Number(candidate);
            if (!pr || Number.isNaN(pr)) {
              core.setFailed("Unable to determine pull request number for review-thread guard.");
              return;
            }

            const prMeta = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr,
            });
            if (prMeta.data.draft === true) {
              core.notice("Skipping unresolved review-thread gate for draft PR.");
              return;
            }

            const query = `
              query($owner: String!, $repo: String!, $pr: Int!, $after: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100, after: $after) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        id
                        isResolved
                        isOutdated
                        comments(first: 1) {
                          nodes {
                            path
                            body
                            author { login }
                            url
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            let threads = [];
            let after = null;
            while (true) {
              const result = await github.graphql(query, { owner, repo, pr, after });
              const conn = result.repository.pullRequest.reviewThreads;
              threads = threads.concat(conn.nodes || []);
              if (!conn.pageInfo?.hasNextPage) break;
              after = conn.pageInfo.endCursor;
            }
            const unresolvedThreads = threads.filter((t) => {
              if (t.isResolved !== false) return false;
              // Exclude github-advanced-security (CodeQL) threads — these cannot be resolved
              // via the GitHub API and must be addressed through CodeQL configuration.
              const author = t.comments?.nodes?.[0]?.author?.login;
              if (author === "github-advanced-security") return false;
              return true;
            });

            if (unresolvedThreads.length === 0) {
              core.notice("No unresolved review threads.");
              return;
            }

            const summary = unresolvedThreads
              .slice(0, 10)
              .map((t, i) => {
                const c = t.comments?.nodes?.[0];
                const author = c?.author?.login ?? "unknown";
                const path = c?.path ?? "unknown-file";
                const state = t.isOutdated === true ? "outdated" : "active";
                const url = c?.url ?? "";
                return `${i + 1}. ${author} on ${path} (${state})${url ? ` ${url}` : ""}`;
              })
              .join("\n");

            core.setFailed(
              `Found ${unresolvedThreads.length} unresolved review thread(s). Resolve them before merge.\n${summary}`,
            );
